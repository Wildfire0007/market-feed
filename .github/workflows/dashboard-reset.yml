name: Monitoring Dashboard Reset (daily)

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * *"  # 22:30 Europe/Budapest during DST
    - cron: "30 21 * * *"  # 22:30 Europe/Budapest during standard time
    
permissions:
  contents: write

concurrency:
  group: dashboard-reset
  cancel-in-progress: true

jobs:
  reset:
    name: Reset monitoring state
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    env:
      TARGET_BRANCH: ${{ github.event.repository.default_branch || github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_BRANCH }}

      - name: Ensure branch is up to date
        run: git pull --ff-only origin "$TARGET_BRANCH"

      - name: Guard 22:30 Europe/Budapest
        id: bp_guard
        run: |
          python3 - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          is_dispatch = os.getenv("GITHUB_EVENT_NAME") == "workflow_dispatch"
          now_bp = datetime.now(ZoneInfo("Europe/Budapest"))
          should_run = is_dispatch or (now_bp.hour == 22 and now_bp.minute == 30)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"run_reset={'true' if should_run else 'false'}\n")
          PY
    
      - name: Run dashboard reset script
        if: steps.bp_guard.outputs.run_reset == 'true'
        env:
          PUBLIC_DIR: public
        run: |
          timeout 180s python3 scripts/reset_dashboard_state.py \
            --anchor-max-age-hours 0 \
            --status-message "scheduled monitoring reset"

      - name: Commit & push reset artefacts
        if: steps.bp_guard.outputs.run_reset == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/_active_anchor.json public/_notify_state.json public/status.json public/trading.db public/trading.db-wal public/trading.db-shm public/monitoring || true
          if git diff --cached --quiet; then
            echo "No monitoring state changes to commit."
            exit 0
          fi
          git commit -m "reset: refresh monitoring state [skip ci]"
          git pull --rebase origin "$TARGET_BRANCH"
          git push origin "HEAD:$TARGET_BRANCH"
