name: Trading Bot

on:
  workflow_dispatch:
 
permissions:
  contents: write

env:
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

jobs:
  run-trading-bot:
    runs-on: ubuntu-latest
    concurrency:
      group: trading_bot_cycle
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install requests

      - name: Position lifecycle (manual recovery)
        run: python scripts/position_lifecycle.py

      - name: Notify management Discord (manual recovery)
        run: python scripts/notify_management_discord.py

      - name: Run-end lifecycle diagnostics
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import sqlite3
          from pathlib import Path

          db_path = Path("public/trading_data.db")
          if db_path.exists():
              conn = sqlite3.connect(db_path)
              cur = conn.cursor()
              total = cur.execute("SELECT COUNT(*) FROM positions").fetchone()[0]
              open_pending = cur.execute(
                  "SELECT COUNT(*) FROM positions WHERE LOWER(COALESCE(status, '')) IN ('open','pending')"
              ).fetchone()[0]
              conn.close()
          else:
              total = 0
              open_pending = 0

          inbox_path = Path("public/_position_lifecycle_inbox.jsonl")
          inbox_lines = len(inbox_path.read_text().splitlines()) if inbox_path.exists() else 0

          state_path = Path("public/_position_lifecycle_state.json")
          state = json.loads(state_path.read_text()) if state_path.exists() else {}
          positions = state.get("positions") or {}
          open_assets = sorted([k for k, v in positions.items() if str((v or {}).get("status") or "").lower() == "open"])
          pending_assets = sorted([k for k, v in positions.items() if str((v or {}).get("status") or "").lower() == "pending"])

          mgmt_state = Path("public/_management_notify_state.json")
          mgmt_updated = mgmt_state.exists() and mgmt_state.stat().st_size > 2
          mgmt_mtime = int(mgmt_state.stat().st_mtime) if mgmt_state.exists() else None

          print(json.dumps({
              "positions_total": total,
              "positions_open_pending": open_pending,
              "lifecycle_inbox_rows": inbox_lines,
              "lifecycle_state_exists": state_path.exists(),
              "lifecycle_open_assets": open_assets,
              "lifecycle_pending_assets": pending_assets,
              "management_notify_state_updated": mgmt_updated,
              "management_notify_state_mtime": mgmt_mtime,
          }, indent=2))
          PY

      - name: Commit and push state changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git add public/  
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update bot state [skip ci]"
          git push
