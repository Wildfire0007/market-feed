name: Trading Bot

on:
  workflow_run:
    workflows: ["TD Full Pipeline (5m)"]
    types: [completed]
  workflow_dispatch:
 
permissions:
  contents: write

env:
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

jobs:
  run-trading-bot:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    concurrency:
      group: trading_bot_cycle
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install requests

      - name: Step 1 - Analysis
        run: python analysis.py

      - name: Step 2 - Notify Discord
        run: python scripts/notify_discord.py

      - name: Step 3 - Position lifecycle
        run: python scripts/position_lifecycle.py

      - name: Step 4 - Notify management Discord
        run: python scripts/notify_management_discord.py

      - name: Commit and push state changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git add public/  
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update bot state [skip ci]"
          git push
